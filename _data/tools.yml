# ---------------------------------------------------------------------------
# The Toolkit catalogue. Each entry renders as a card on /tools/ and feeds the
# homepage "featured" strip (set `featured: true`).
#
# Fields:
#   name      display name
#   blurb     one line, <= ~90 chars, sentence case, no trailing period needed
#   lang      Mathematica | C/C++ | Python | SageMath | Fortran
#   domain    PRIMARY domain — one of the ids in _data/domains.yml. Drives the
#             module-page breadcrumb and "related tools".
#   also_in   optional list of ADDITIONAL domain ids the tool is listed under in
#             the catalogue, e.g. `also_in: [self-force]`. The tool then shows
#             under its primary domain and each of these when filtering.
#   status    stable | beta | data
#   tags      free-form keywords for search (Kerr, Schwarzschild, time-domain...)
#   repo      GitHub URL
#   url       documentation / package home (falls back to repo if omitted)
#   install   copy-paste install command (optional)
#   featured  show on the homepage (optional, default false)
# ---------------------------------------------------------------------------

