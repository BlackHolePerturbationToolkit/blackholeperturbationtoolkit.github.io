  tags: [EMRI, Kerr, waveforms, GPU, LISA]
  repo: https://github.com/BlackHolePerturbationToolkit/FastEMRIWaveforms
  url: https://bhptoolkit.org/FastEMRIWaveforms_main.html
  install: pip install fastemriwaveforms
  featured: true

