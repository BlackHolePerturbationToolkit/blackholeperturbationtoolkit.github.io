<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#0b1020">
<link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}">
<link rel="icon" type="image/png" sizes="32x32" href="{{ '/favicon-32x32.png' | relative_url }}">
<link rel="icon" type="image/png" sizes="16x16" href="{{ '/favicon-16x16.png' | relative_url }}">
<link rel="icon" href="{{ '/favicon.ico' | relative_url }}" sizes="any">
<link rel="apple-touch-icon" href="{{ '/apple-touch-icon.png' | relative_url }}">
{% assign page_title = page.title | default: site.title %}
<title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }} | {{ site.tagline }}{% endif %}</title>
<meta name="description" content="{{ page.description | default: site.description | strip_newlines }}">
<meta property="og:title" content="{{ page_title }}">
<meta property="og:description" content="{{ page.description | default: site.description | strip_newlines }}">
<meta property="og:type" content="website">
<meta property="og:site_name" content="{{ site.title }}">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.44.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">

<script>
  (function () {
    try {
      var t = localStorage.getItem('bhp-theme');
      if (!t) t = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', t);
    } catch (e) {}
  })();
</script>
